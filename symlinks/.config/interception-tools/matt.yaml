MAPPINGS:
  - KEY: KEY_CAPSLOCK
    TAP: KEY_ESC
    HOLD: KEY_LEFTCTRL

  - KEY: KEY_LEFTMETA
    TAP: KEY_LEFTALT
    HOLD: KEY_LEFTALT
  - KEY: KEY_LEFTALT
    TAP: KEY_LEFTMETA
    HOLD: KEY_LEFTMETA

  - KEY: KEY_RIGHTMETA
    TAP: KEY_RIGHTALT
    HOLD: KEY_RIGHTALT
  - KEY: KEY_RIGHTALT
    TAP: KEY_RIGHTMETA
    HOLD: KEY_RIGHTMETA

  - KEY: KEY_LEFTCTRL
    TAP: KEY_ESC
    HOLD: KEY_LEFTCTRL
  - KEY: KEY_RIGHTCTRL
    TAP: KEY_ESC
    HOLD: KEY_RIGHTCTRL
